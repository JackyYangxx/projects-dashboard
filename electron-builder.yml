appId: com.projects-dashboard.app
productName: Project Dashboard

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - docs/app-icon/*.ico
  - docs/app-icon/*.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: docs/app-icon
  signAndEditExecutable: false

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: docs/app-icon

publish: null