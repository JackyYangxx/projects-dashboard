name: Build Windows

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Electron app
        run: npm run electron:build
        env:
          NODE_ENV: production

      - name: Verify exe exists
        run: |
          $exe = Get-ChildItem release -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Write-Output "Found exe: $($exe.FullName)"
            Write-Output "Size: $([math]::Round($exe.Length / 1MB, 2)) MB"
          } else {
            Write-Output "ERROR: No exe found in release directory"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}