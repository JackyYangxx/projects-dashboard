name: Build Windows

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'electron/**'
      - 'package.json'
      - 'electron-builder.yml'
      - 'tsconfig.json'
      - 'vite.config.ts'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run electron:build
        env:
          NODE_ENV: production

      - name: Verify exe exists
        run: |
          $exe = Get-ChildItem release -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Write-Output "Found exe: $($exe.FullName)"
            Write-Output "Size: $([math]::Round($exe.Length / 1MB, 2)) MB"
          } else {
            Write-Output "ERROR: No exe found in release directory"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/*.zip

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}