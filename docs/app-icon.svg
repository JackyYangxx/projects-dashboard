<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3B82F6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Top highlight -->
  <rect x="0" y="0" width="512" height="256" rx="115" ry="115" fill="url(#highlight)"/>

  <!-- Precision grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <line x1="100" y1="100" x2="412" y2="100"/>
    <line x1="100" y1="180" x2="412" y2="180"/>
    <line x1="100" y1="332" x2="412" y2="332"/>
    <line x1="100" y1="412" x2="412" y2="412"/>
    <line x1="100" y1="100" x2="100" y2="412"/>
    <line x1="180" y1="100" x2="180" y2="412"/>
    <line x1="332" y1="100" x2="332" y2="412"/>
    <line x1="412" y1="100" x2="412" y2="412"/>
  </g>

  <!-- Corner precision marks -->
  <g fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round">
    <!-- Top left -->
    <path d="M70 130 L70 100 L100 100"/>
    <!-- Top right -->
    <path d="M442 100 L412 100 L412 130"/>
    <!-- Bottom left -->
    <path d="M70 382 L70 412 L100 412"/>
    <!-- Bottom right -->
    <path d="M412 412 L442 412 L442 382"/>
  </g>

  <!-- Outer targeting ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Inner crosshairs -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="1.5">
    <line x1="156" y1="256" x2="356" y2="256"/>
    <line x1="256" y1="156" x2="256" y2="356"/>
  </g>

  <!-- Small center dot -->
  <circle cx="256" cy="256" r="6" fill="white"/>

  <!-- Main P letter -->
  <text x="256" y="285" font-family="'Fira Code', 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="200" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-5">P</text>

  <!-- C accent - small positioned element -->
  <text x="335" y="210" font-family="'Fira Sans', 'SF Pro Display', sans-serif" font-size="48" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">C</text>
</svg>